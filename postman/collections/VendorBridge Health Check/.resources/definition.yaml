$kind: collection
name: 'VendorBridge Health Check'
description: 'Automated health checks for all VendorBridge ERP API endpoints. Monitors endpoint availability, response codes, and basic response structure.'
variables:
  - key: base_url
    value: 'http://localhost:8000'
    description: 'Base URL for the VendorBridge API'
  - key: access_token
    value: ''
    description: 'JWT access token, set automatically by the Login request'
  - key: refresh_token
    value: ''
    description: 'JWT refresh token, set automatically by the Login request'
