# ──────────────────────────────────────────────
# VendorBridge ERP – Docker Compose
# ──────────────────────────────────────────────
version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge
      POSTGRES_DB: vendorbridge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge -d vendorbridge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Flask Application ──────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads:/app/uploads
      - pdfs:/app/generated_pdfs

volumes:
  pgdata:
  uploads:
  pdfs:
