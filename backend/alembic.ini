# VendorBridge ERP – Alembic Configuration

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for create_date in migration files
# timezone =

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during "revision" command
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# Version location paths; multiple paths separated by ;
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator; os.pathsep by default
# version_path_separator = os

# Output encoding for revision files
output_encoding = utf-8

# SQLAlchemy connection URL
# Override in production via env var or alembic -x dburl=...
sqlalchemy.url = postgresql://vendorbridge:vendorbridge@localhost:5432/vendorbridge_db


[post_write_hooks]
# Post-write hooks (e.g. black formatting)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 120

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
